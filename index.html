<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourcyc Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#111;
    padding:25px;
    text-align:center;
}

header img{
    height:110px;
}

/* PRODUCT */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{ font-weight:bold; margin:6px 0; }

.status{ font-size:12px; color:green; font-weight:bold; }
.status.restock{ color:red; }

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button.white{
    background:#e60000;
    color:white;
}

button.black{
    background:#222;
    color:white;
}

button.black:disabled{
    background:#aaa;
    cursor:not-allowed;
}

/* CART BUTTON */
.cart-btn{
    position:fixed;
    bottom:10px;
    right:10px;
    background:black;
    color:white;
    padding:12px 15px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

/* OVERLAY */
.overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:white;
    padding:15px;
    overflow:auto;
}

.close-btn{
    background:#ddd;
    padding:8px;
    border:none;
    border-radius:6px;
    margin-bottom:10px;
    cursor:pointer;
}

.cart-item{
    font-size:13px;
    border-bottom:1px solid #eee;
    padding:8px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

input, textarea{
    width:100%;
    padding:8px;
    margin:5px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

.checkout-btn{
    background:green;
    color:white;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

.note{
    font-size:11px;
    color:#555;
    margin-top:5px;
}

.total{
    font-weight:bold;
    margin:10px 0;
}
</style>
</head>

<body>

<header>
    <img src="logo.PNG">
</header>

<div class="container">

    <!-- V1 -->
    <div class="card">
        <img src="aero-socks-v1.PNG">
        <h3>Aero Socks V1</h3>
        <div class="price">Rp99.000</div>
        <div class="status">READY</div>

        <button class="white" onclick="addItem('Aero Socks V1 White',99000)">White</button>
        <button class="black" disabled>Black (Habis)</button>
    </div>

    <!-- V2 -->
    <div class="card">
        <img src="aero-socks-v2.PNG">
        <h3>Aero Socks V2</h3>
        <div class="price">Rp99.000</div>
        <div class="status">READY</div>

        <button class="white" onclick="addItem('Aero Socks V2 White',99000)">White</button>
        <button class="black" disabled>Black (Habis)</button>
    </div>

    <!-- V4 -->
    <div class="card">
        <img src="aero-socks-v4.PNG">
        <h3>Aero Socks V4</h3>
        <div class="price">Rp169.000</div>
        <div class="status restock">RESTOCK</div>
        <button disabled>RESTOCK</button>
    </div>

    <!-- COVER SHOES -->
    <div class="card">
        <img src="cover-shoes-aero.PNG">
        <h3>Cover Shoes Aero</h3>
        <div class="price">Rp379.000</div>
        <div class="status">READY</div>
        <button onclick="addItem('Cover Shoes Aero',379000)">Tambah</button>
    </div>

</div>

<!-- CART -->
<div class="cart-btn" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">

    <button class="close-btn" onclick="closeCart()">← Kembali</button>

    <h3>Keranjang</h3>

    <div id="cartList"></div>

    <div class="total" id="total">Total: Rp0</div>

    <input id="nama" placeholder="Nama">
    <input id="nohp" placeholder="No WhatsApp">
    <textarea id="alamat" placeholder="Alamat lengkap"></textarea>

    <div class="note">
        ⚠️ Harga belum termasuk ongkir<br>
        📦 Ongkir akan dihitung via WhatsApp
    </div>

    <button class="checkout-btn" onclick="checkout()">Kirim ke WhatsApp</button>
</div>

<script>
let cart = [];

function addItem(name,price){
    let found = cart.find(i=>i.name===name);
    if(found){
        found.qty++;
    }else{
        cart.push({name,price,qty:1});
    }
    updateCount();
}

function updateCount(){
    document.getElementById("count").innerText =
        cart.reduce((a,b)=>a+b.qty,0);
}

function openCart(){
    if(cart.length===0){
        alert("Keranjang kosong");
        return;
    }
    renderCart();
    document.getElementById("overlay").style.display="block";
}

function closeCart(){
    document.getElementById("overlay").style.display="none";
}

function increase(i){
    cart[i].qty++;
    renderCart();
    updateCount();
}

function decrease(i){
    cart[i].qty--;
    if(cart[i].qty<=0){
        cart.splice(i,1);
    }
    renderCart();
    updateCount();
}

function removeItem(i){
    cart.splice(i,1);
    renderCart();
    updateCount();
}

function renderCart(){
    let html="";
    let total=0;

    cart.forEach((item,i)=>{
        total += item.price * item.qty;

        html+=`
        <div class="cart-item">
            <div>
                ${item.name} x${item.qty}
            </div>

            <div>
                <span onclick="decrease(${i})" style="background:#ddd;padding:2px 6px;border-radius:4px;cursor:pointer;">-</span>
                <span onclick="increase(${i})" style="background:#ddd;padding:2px 6px;border-radius:4px;cursor:pointer;">+</span>
                <span onclick="removeItem(${i})" style="background:red;color:white;padding:2px 6px;border-radius:4px;cursor:pointer;">x</span>
            </div>
        </div>`;
    });

    document.getElementById("cartList").innerHTML = html;
    document.getElementById("total").innerText =
        "Total: Rp"+total.toLocaleString();
}

function checkout(){
    let nama=document.getElementById("nama").value;
    let nohp=document.getElementById("nohp").value;
    let alamat=document.getElementById("alamat").value;

    let msg="ORDER FOURCYC STORE\n\n";
    msg+="Nama: "+nama+"\nNo HP: "+nohp+"\nAlamat: "+alamat+"\n\n";

    let total=0;

    cart.forEach((item,i)=>{
        let sub=item.price*item.qty;
        total+=sub;
        msg+=(i+1)+". "+item.name+" x"+item.qty+" = Rp"+sub+"\n";
    });

    msg+="\nTOTAL: Rp"+total+"\n";
    msg+="\nNOTE:\n- Harga belum termasuk ongkir\n- Ongkir via WhatsApp";

    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
