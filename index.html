<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourcyc</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
padding:30px;
text-align:center;
}

header h1{
font-size:40px;
letter-spacing:3px;
}

header p{
margin-top:10px;
color:#b5b5b5;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{

background:#171717;

border-radius:18px;

padding:20px;

margin-bottom:20px;

}

.card h2{

margin-bottom:10px;

}

.price{

font-size:24px;

color:#ff3b3b;

font-weight:bold;

margin:10px 0;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#ff2d2d;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#ff0000;

}

footer{

text-align:center;

padding:30px;

color:gray;

}

</style>

</head>

<body>

<header>

<h1>FOURCYC</h1>

<p>Ride Further. Carry Less.</p>

</header>

<div class="container">

<div class="card">

<h2>Aero Socks V1</h2>

<div class="price">Rp99.000</div>

<p>All Size</p>

<br>

<button>Pesan Sekarang</button>

</div>

<div class="card">

<h2>Aero Socks V2</h2>

<div class="price">Rp99.000</div>

<p>All Size</p>

<br>

<button>Pesan Sekarang</button>

</div>

<div class="card">

<h2>Cover Shoes Aero</h2>

<div class="price">Rp379.000</div>

<p>All Size (40-46)</p>

<br>

<button>Pesan Sekarang</button>

</div>

</div>

<footer>

© 2026 Fourcyc

</footer>

</body>
</html>
