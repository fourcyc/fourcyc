<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourcyc Store</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

/* HEADER */
header{
    background:#111;
    padding:15px;
    display:flex;
    align-items:center;
}

.menu{
    font-size:26px;
    color:white;
    cursor:pointer;
    margin-right:10px;
}

.logoBox{
    flex:1;
    display:flex;
    justify-content:flex-start;
}

.logoBox img{
    height:120px;
}

/* PRODUCT */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

.card{
    background:#fff;
    padding:10px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    border-radius:10px;
}

.price{
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.buy{
    background:#e60000;
    color:white;
}

/* CART */
.cart-btn{
    position:fixed;
    right:15px;
    bottom:15px;
    background:black;
    color:white;
    padding:12px;
    border-radius:50px;
}

/* MENU */
#sideMenu{
    position:fixed;
    top:0;
    left:-260px;
    width:220px;
    height:100%;
    background:#111;
    color:white;
    padding:20px;
    transition:0.3s;
    z-index:999;
}

#bg{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:998;
}

/* STEP */
.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:white;
    padding:15px;
    overflow:auto;
}

.step{display:none;}
.step.active{display:block;}

input,textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
}

/* VARIANT BUTTON */
.variantBtn{
    padding:5px;
    margin:3px;
    font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="menu" onclick="openMenu()">☰</div>
<div class="logoBox">
<img src="logo.jpg">
</div>
</header>

<!-- HOME -->
<div id="homePage">

<div class="container">

<!-- V1 -->
<div class="card">
<img id="imgV1" src="aero-socks-v1.PNG">

<h3>V1 Socks</h3>
<div class="price">Rp99.000</div>

<button class="variantBtn" onclick="setV1('white')">Putih</button>
<button class="variantBtn" onclick="setV1('black')">Hitam</button>

<button class="buy" onclick="add('V1',99000)">Tambah (Putih saja)</button>
</div>

<!-- V2 -->
<div class="card">
<img id="imgV2" src="aero-socks-v2.PNG">

<h3>V2 Socks</h3>
<div class="price">Rp109.000</div>

<button class="variantBtn" onclick="setV2('white')">Putih</button>
<button class="variantBtn" onclick="setV2('black')">Hitam</button>

<button class="buy" onclick="add('V2',109000)">Tambah (Putih saja)</button>
</div>

<!-- V4 -->
<div class="card">
<img src="aero-socks-v4.PNG">
<h3>V4</h3>
<div class="price">RESTOCK</div>
<button disabled>Habis</button>
</div>

<!-- COVER SHOES -->
<div class="card">
<img src="cover-shoes-aero.PNG">
<h3>Cover Shoes</h3>
<div class="price">Rp379.000</div>
<button class="buy" onclick="add('Cover Shoes',379000)">Tambah</button>
</div>

</div>

</div>

<!-- CART -->
<div class="cart-btn" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="overlay" id="cart">

<h3>Checkout</h3>

<div id="step1" class="step active">
<div id="list"></div>
<button onclick="step2()">Lanjut</button>
</div>

<div id="step2" class="step">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="No WA">
<textarea id="alamat" placeholder="Alamat"></textarea>
<button onclick="step1()">Back</button>
<button onclick="step3()">Lanjut</button>
</div>

<div id="step3" class="step">

<h4>Payment</h4>

<button onclick="selectPay('QRIS')">QRIS</button>
<button onclick="selectPay('DANA')">DANA</button>

<div id="payStatus">Belum dipilih</div>

<button onclick="checkout()">Kirim WA</button>

</div>

</div>

<!-- MENU -->
<div id="sideMenu">

<p onclick="goHome()">🏠 Home</p>
<p onclick="goAbout()">ℹ️ About Us</p>

<hr>

<p>💳 QRIS</p>
<p>💸 DANA</p>

<hr>

<p>🚚 J&T Express</p>

<p onclick="closeMenu()" style="color:red;">Close</p>

</div>

<div id="bg" onclick="closeMenu()"></div>

<script>

let cart=[];
let payment="";

/* VARIANT STATE */
let selectedVariant = {
    V1:"white",
    V2:"white"
};

/* VARIANT IMAGE (PREVIEW ONLY) */
function setV1(color){
let img=document.getElementById("imgV1");

if(color==="white"){
img.src="aero-socks-v1.PNG";
selectedVariant.V1="white";
}

if(color==="black"){
img.src="hitam-v1.PNG";
selectedVariant.V1="black";
}
}

function setV2(color){
let img=document.getElementById("imgV2");

if(color==="white"){
img.src="aero-socks-v2.PNG";
selectedVariant.V2="white";
}

if(color==="black"){
img.src="hitam-v2.PNG";
selectedVariant.V2="black";
}
}

/* CART ONLY WHITE */
function add(product,price){

let variant="white";

if(product==="V1") variant=selectedVariant.V1;
if(product==="V2") variant=selectedVariant.V2;

/* ❌ HITAM TIDAK BOLEH MASUK */
if(variant==="black"){
alert("Varian Hitam hanya preview (tidak tersedia)");
return;
}

let name="Aero Socks "+product+" (Putih)";

let f=cart.find(x=>x.nama===name);

if(f) f.qty++;
else cart.push({nama:name,price:price,qty:1});

document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0);
}

/* PAYMENT */
function selectPay(type){
payment=type;
document.getElementById("payStatus").innerText="Payment: "+type;
}

/* CHECKOUT */
function checkout(){

if(payment===""){
alert("Pilih payment dulu");
return;
}

let msg="ORDER FOURCYC STORE\n\n";

cart.forEach(x=>{
msg+=x.nama+" x"+x.qty+"\n";
});

msg+="Payment: "+payment;

window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
}

/* MENU */
function openMenu(){
document.getElementById("sideMenu").style.left="0";
document.getElementById("bg").style.display="block";
}

function closeMenu(){
document.getElementById("sideMenu").style.left="-260px";
document.getElementById("bg").style.display="none";
}

function goHome(){
closeMenu();
}

function goAbout(){
alert("About Us: Fourcyc Store - kualitas & harga terjangkau");
closeMenu();
}

/* STEP */
function step1(){
document.getElementById("step1").classList.add("active");
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.remove("active");
}

function step2(){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
document.getElementById("step3").classList.remove("active");
}

function step3(){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
}

</script>

</body>
</html>
